# The one supported deployment (see PLAN.md § Hosting):
# leaf (bot + server, one process) + Cloudflare Tunnel sidecar.
#
# First run: `docker compose up`, then open http://localhost:8080/setup and
# enter the setup code from the logs. No env vars to edit.

services:
  leaf:
    build: .
    container_name: leaf
    restart: unless-stopped
    ports:
      - "8080:8080" # local access to setup page / API; the tunnel covers public
    volumes:
      - leaf-data:/data
    environment:
      LOG_LEVEL: info
    stop_grace_period: 30s

  # Cloudflare Tunnel: publishes leaf at your domain without port forwarding.
  # Set TUNNEL_TOKEN in a .env file next to this compose file, then:
  #   docker compose --profile tunnel up -d
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: leaf-tunnel
    restart: unless-stopped
    profiles: [tunnel]
    command: tunnel --no-autoupdate run
    environment:
      # Required when the tunnel profile is active; cloudflared exits
      # immediately without it.
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:-}
    depends_on:
      - leaf

volumes:
  leaf-data:
