# cargo-deny configuration (see docs/rust-guidelines.md § Dependencies).

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Workspace-internal path dependencies carry no version; that's fine.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
