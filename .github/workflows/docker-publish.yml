name: docker publish

# Build the image and push it to GHCR so the Unraid box (and anyone else) can
# pull it instead of building from source. ci.yml still build-checks the
# Dockerfile on PRs; this workflow is the one that publishes.
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: build + push (ghcr)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # latest -> main HEAD; vX.Y.Z tags -> semver tags; sha tag always (pinnable).
      - name: Tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/leaf
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          # Unraid is amd64; add linux/arm64 here if you ever need it (slower,
          # builds under QEMU emulation).
          platforms: linux/amd64
          push: true
          # The Discord client id is public; it's baked into the gallery bundle
          # at build time. Set it as a repo variable (Settings → Secrets and
          # variables → Actions → Variables): VITE_DISCORD_CLIENT_ID.
          build-args: |
            VITE_DISCORD_CLIENT_ID=${{ vars.VITE_DISCORD_CLIENT_ID }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Shared with ci.yml's build-check, so this mostly hits cache.
          cache-from: type=gha
          cache-to: type=gha,mode=max
