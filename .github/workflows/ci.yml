name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"

jobs:
  rust:
    name: fmt · clippy · test · deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Reads rust-toolchain.toml; caches the registry and target dir.
      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: rustfmt
        run: cargo fmt --all --check

      - name: clippy (deny warnings)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: tests
        run: cargo test --workspace

      - name: sqlx offline artifact is current
        # prepare --check validates the committed .sqlx cache against a real
        # schema, so it needs a live DB (SQLX_OFFLINE is for the cached build,
        # not for prepare itself).
        env:
          DATABASE_URL: sqlite:ci.db
          SQLX_OFFLINE: "false"
        run: |
          cargo install sqlx-cli --no-default-features --features sqlite --locked
          sqlx database create
          sqlx migrate run --source migrations
          cargo sqlx prepare --check --workspace -- --all-targets

      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2

  frontend:
    name: prettier · eslint · svelte-check · vitest · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: activity
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: activity/package-lock.json
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run check
      - run: npm run test:run
      - run: npm run build
      - run: npm run bundle:check

  docker:
    name: docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
